name: Node.js CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npm test
      - run: npm run ts-check
      - run: npm run js-check
      - run: npm run lint
